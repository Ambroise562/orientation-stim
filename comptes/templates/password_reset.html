{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">Mot de passe oublié ?</h3>
                    <p class="text-muted small">Entrez votre email pour recevoir un lien de récupération.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Votre adresse email</label>
                        <div class="search-group border p-2 bg-light">
                            {{ form.email }}
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill shadow-sm">
                        Envoyer le lien
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
