{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">Sécurité</h3>
                    <p class="text-muted small">Modifier votre mot de passe</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">{{ field.label }}</label>
                        <div class="search-group border p-2 bg-light">
                            {{ field }}
                        </div>
                        {% if field.errors %}
                            {% for error in field.errors %}
                                <div class="text-danger x-small">{{ error }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-warning w-100 py-2 fw-bold mt-3 rounded-pill shadow-sm">
                        Mettre à jour le mot de passe
                    </button>
                    <div class="text-center mt-3">
                        <a href="{% url 'modifier_profil' %}" class="text-decoration-none small">Retour au profil</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
