{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 text-center">
        <div class="card shadow border-0 rounded-4 p-5">
            <i class="bi bi-envelope-check text-primary mb-3" style="font-size: 3rem;"></i>
            <h3 class="fw-bold">Email envoyé !</h3>
            <p class="text-muted">
                Nous vous avons envoyé des instructions par e-mail. Si un compte existe avec cet email, vous le recevrez sous peu.
            </p>
            <p class="small text-info">N'oubliez pas de vérifier vos courriers indésirables (Spams).</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary rounded-pill mt-3 px-4">Retour à la connexion</a>
        </div>
    </div>
</div>
{% endblock %}
